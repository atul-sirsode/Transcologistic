<!DOCTYPE html>
<html>
<head>
    <title>Test File Upload</title>
</head>
<body>
    <h1>Test File Upload to API</h1>
    <form id="uploadForm">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" required>
        <br><br>
        <button type="submit">Upload File</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                document.getElementById('result').innerHTML = 'Please select a file';
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('same_file_name', file.name);
            
            try {
                const response = await fetch('http://localhost:4000/api/file-history', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = `
                        <h3>Success!</h3>
                        <p>File ID: ${result.id}</p>
                        <p>Record Count: ${result.record_count}</p>
                        <p>Auto-calculated: ${result.auto_calculated}</p>
                        <p>Message: ${result.message}</p>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <h3>Error!</h3>
                        <p>${result.error}</p>
                    `;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Network Error!</h3>
                    <p>${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
